<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro ASCII Art & Video Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }

        #ascii-output {
            font-family: 'Fira Code', monospace;
            line-height: 1;
            white-space: pre;
            cursor: text;
            background: #000;
            letter-spacing: 0px;
            display: inline-block;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .is-playing {
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.3);
            border-color: #10b981 !important;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                ASCII Media Engine
            </h1>
            <p class="text-slate-400 mt-2">Convert images and live video into real-time text animation.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                
                <div class="flex p-1 bg-slate-900 rounded-xl">
                    <button id="modeImage" class="flex-1 py-2 text-xs font-bold rounded-lg bg-blue-500 text-white transition-all">IMAGE</button>
                    <button id="modeVideo" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition-all">VIDEO</button>
                </div>

                <div id="imageInputGroup">
                    <label class="block text-sm font-medium mb-2 text-blue-300">Upload Image</label>
                    <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 cursor-pointer">
                </div>

                <div id="videoInputGroup" class="hidden space-y-3">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-emerald-300">Video Link / File</label>
                        <input type="text" id="videoUrl" placeholder="Paste direct .mp4 link..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white mb-2 outline-none focus:ring-1 focus:ring-emerald-500">
                        <input type="file" id="videoFileInput" accept="video/*" class="block w-full text-xs text-slate-400 file:mr-3 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-emerald-600 file:text-white cursor-pointer">
                        <p class="text-[10px] text-slate-500 mt-2 italic">*Use links for embed sharing.</p>
                    </div>
                    <button id="playPauseBtn" class="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold transition-colors">Play / Pause</button>
                </div>

                <hr class="border-slate-700">

                <div>
                    <label class="flex justify-between text-sm font-medium mb-2">
                        <span>Resolution</span>
                        <span id="resVal" class="text-blue-400">80</span>
                    </label>
                    <input type="range" id="resolution" min="20" max="200" value="80" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <label class="flex justify-between text-sm font-medium mb-2">
                        <span>Vertical Scale</span>
                        <span id="lineHeightVal" class="text-blue-400">0.50</span>
                    </label>
                    <input type="range" id="lineHeight" min="0.3" max="1" step="0.05" value="0.50" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Character Set</label>
                    <select id="charSet" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value=" .-~=;*<?(]IV#%@╬">Classic</option>
                        <option value=" .:-=+*#%@">Standard</option>
                        <option value=" ░▒▓█">Blocks</option>
                        <option value="01">Binary</option>
                        <option value=" █◘◙▲►♦#%@?wv]I{)=\\<|^\"*=;+-.` ">Extended</option>
                    </select>
                </div>

                <div class="space-y-2 pt-4 border-t border-slate-700">
                    <label class="block text-xs font-medium mb-1 text-purple-300">Share & Export</label>
                    <button id="exportHtmlBtn" class="w-full py-2 bg-purple-900/40 hover:bg-purple-600 border border-purple-700/50 transition-colors rounded-lg font-bold text-xs text-purple-200">Copy Compressed Live Embed</button>
                    <button id="copyBtn" class="w-full py-2 bg-blue-900/40 hover:bg-blue-600 border border-blue-700/50 transition-colors rounded-lg font-bold text-xs text-blue-200">Copy Current Frame</button>
                </div>
                
                <div id="status" class="hidden text-center py-2 bg-slate-900 rounded-lg text-xs font-mono text-emerald-400">
                    Copied!
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="canvasContainer" class="bg-slate-900 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl flex flex-col h-[70vh] transition-all">
                    <div class="flex items-center justify-between px-4 py-2 bg-slate-800 border-b border-slate-700">
                        <span id="engineLabel" class="text-xs font-mono text-slate-400 uppercase tracking-widest text-blue-400">Image Mode</span>
                    </div>
                    <div class="flex-grow overflow-auto p-4 custom-scrollbar bg-black flex justify-center items-start">
                        <div id="ascii-output">Ready for input...</div>
                    </div>
                </div>
                <div id="dimensions" class="text-right text-slate-500 text-xs font-mono">Dimensions: 0x0</div>
            </div>
        </div>
    </div>

    <video id="hiddenVideo" class="hidden" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const videoFileInput = document.getElementById('videoFileInput');
        const videoUrlInput = document.getElementById('videoUrl');
        const resInput = document.getElementById('resolution');
        const lhInput = document.getElementById('lineHeight');
        const charSetSelect = document.getElementById('charSet');
        const asciiOutput = document.getElementById('ascii-output');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const hiddenVideo = document.getElementById('hiddenVideo');
        const resVal = document.getElementById('resVal');
        const lhVal = document.getElementById('lineHeightVal');
        const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
        
        const modeImage = document.getElementById('modeImage');
        const modeVideo = document.getElementById('modeVideo');
        const imageGroup = document.getElementById('imageInputGroup');
        const videoGroup = document.getElementById('videoInputGroup');
        const engineLabel = document.getElementById('engineLabel');

        let originalImage = null;
        let isVideoMode = false;
        let animationId = null;

        modeImage.onclick = () => {
            isVideoMode = false;
            stopVideo();
            modeImage.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-blue-500 text-white";
            modeVideo.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400";
            imageGroup.classList.remove('hidden');
            videoGroup.classList.add('hidden');
            engineLabel.textContent = "Image Mode";
            if(originalImage) processFrame(originalImage);
        };

        modeVideo.onclick = () => {
            isVideoMode = true;
            modeVideo.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-emerald-500 text-white";
            modeImage.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400";
            videoGroup.classList.remove('hidden');
            imageGroup.classList.add('hidden');
            engineLabel.textContent = "Video Mode";
        };

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => { originalImage = img; processFrame(img); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        videoUrlInput.onchange = () => {
            if (videoUrlInput.value) {
                hiddenVideo.src = videoUrlInput.value;
                hiddenVideo.play().then(startVideoLoop);
            }
        };

        videoFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                hiddenVideo.src = URL.createObjectURL(file);
                hiddenVideo.play().then(startVideoLoop);
            }
        };

        document.getElementById('playPauseBtn').onclick = () => {
            hiddenVideo.paused ? hiddenVideo.play() : hiddenVideo.pause();
        };

        function startVideoLoop() {
            if (animationId) cancelAnimationFrame(animationId);
            const step = () => {
                if (isVideoMode && !hiddenVideo.paused) {
                    processFrame(hiddenVideo);
                    animationId = requestAnimationFrame(step);
                }
            };
            animationId = requestAnimationFrame(step);
        }

        function stopVideo() {
            hiddenVideo.pause();
            if (animationId) cancelAnimationFrame(animationId);
        }

        function processFrame(source) {
            const alphabet = charSetSelect.value;
            const res = parseInt(resInput.value);
            const lh = parseFloat(lhInput.value);
            const sw = source.videoWidth || source.width || 0;
            const sh = source.videoHeight || source.height || 0;
            if (!sw) return;

            const w = res;
            const h = Math.floor(res * (sh/sw) * lh);
            if (hiddenCanvas.width !== w || hiddenCanvas.height !== h) {
                hiddenCanvas.width = w; hiddenCanvas.height = h;
            }
            
            ctx.drawImage(source, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h).data;
            let out = "";
            for (let y=0; y<h; y++) {
                for (let x=0; x<w; x++) {
                    const i = (y*w+x)*4;
                    const b = (0.21*data[i] + 0.72*data[i+1] + 0.07*data[i+2])/255;
                    out += alphabet[Math.floor(b*(alphabet.length-1))] || ' ';
                }
                out += "\n";
            }
            asciiOutput.textContent = out;
            document.getElementById('dimensions').textContent = `Dimensions: ${w}x${h}`;
            asciiOutput.style.fontSize = `${Math.max(2, 800/w)}px`;
        }

        function copy(text, msg) {
            const t = document.createElement("textarea");
            document.body.appendChild(t); t.value = text; t.select();
            document.execCommand("copy"); document.body.removeChild(t);
            const s = document.getElementById('status');
            s.textContent = msg; s.classList.remove('hidden');
            setTimeout(() => s.classList.add('hidden'), 2000);
        }

        document.getElementById('copyBtn').onclick = () => copy(asciiOutput.textContent, "ASCII Frame Copied!");

        document.getElementById('exportHtmlBtn').onclick = () => {
            let mediaUrl = "";
            if (isVideoMode) {
                mediaUrl = videoUrlInput.value;
                if (!mediaUrl || mediaUrl.startsWith('blob:')) return alert("Please use a direct URL link for compressed sharing. Local files are too large for URL embedding.");
            } else {
                if (!originalImage || !originalImage.src.startsWith('data:')) return alert("Please upload an image first.");
                mediaUrl = originalImage.src;
            }

            const safeA = charSetSelect.value.replace(/"/g, '&quot;');
            // Minified embed engine to save characters
            const html = `<!DOCTYPE html><html><body style="background:#000;color:#fff;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden"><pre id="o" style="font-family:monospace;line-height:${lhInput.value};font-size:${150/resInput.value}vw;white-space:pre"></pre>${isVideoMode?`<video id="m" src="${mediaUrl}" loop autoplay muted playsinline style="display:none"></video>`:`<img id="m" src="${mediaUrl}" style="display:none">`}<canvas id="c" style="display:none"></canvas><script>const m=document.getElementById('m'),o=document.getElementById('o'),c=document.getElementById('c'),ctx=c.getContext('2d'),a="${safeA}",r=${resInput.value},lh=${lhInput.value};function f(){const w=m.videoWidth||m.width,h=m.videoHeight||m.height;if(!w)return setTimeout(f,50);const rw=r,rh=Math.floor(r*(h/w)*lh);c.width=rw;c.height=rh;ctx.drawImage(m,0,0,rw,rh);const d=ctx.getImageData(0,0,rw,rh).data;let s="";for(let y=0;y<rh;y++){for(let x=0;x<rw;x++){const i=(y*rw+x)*4;const b=(0.21*d[i]+0.72*d[i+1]+0.07*d[i+2])/255;s+=a[Math.floor(b*(a.length-1))]||' '}s+='\\n'}o.textContent=s;${isVideoMode?'requestAnimationFrame(f)':''}}m.complete||m.readyState>0?f():(m.onload=f,m.onloadedmetadata=f)<\/script></body></html>`;
            
            // Encode using base64 for better compatibility with data:text/html
            const dataUrl = "data:text/html;base64," + btoa(unescape(encodeURIComponent(html)));
            copy(dataUrl, "Compressed Live Embed Copied!");
        };

        [resInput, lhInput, charSetSelect].forEach(i => i.oninput = () => {
            resVal.textContent = resInput.value;
            lhVal.textContent = lhInput.value;
            if(!isVideoMode && originalImage) processFrame(originalImage);
        });
    </script>
</body>
</html>

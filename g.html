<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro ASCII Art & Video Engine (Form + Sheet Backend)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }

        #ascii-output {
            font-family: 'Fira Code', monospace;
            line-height: 1;
            white-space: pre;
            cursor: text;
            background: #000;
            letter-spacing: 0px;
            display: inline-block;
            transform-origin: top left;
            will-change: contents;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        body.view-mode { background-color: #000; overflow: hidden; }
        body.view-mode #main-ui { display: none; }
        body.view-mode #canvasContainer {
            width: 100vw;
            height: 100vh;
            border: none;
            border-radius: 0;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="main-ui" class="p-4 md:p-8 max-w-7xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-red-400">
                ASCII FORM ENGINE
            </h1>
            <p class="text-slate-400 mt-2">Single-Packet Form Data Transmission</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-slate-800/80 p-6 rounded-3xl border border-slate-700 backdrop-blur-xl shadow-xl">
                <div class="flex p-1 bg-slate-900 rounded-2xl">
                    <button id="modeImage" class="flex-1 py-2 text-xs font-bold rounded-xl bg-purple-600 text-white transition-all">IMAGE</button>
                    <button id="modeVideo" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition-all">VIDEO</button>
                </div>

                <div id="inputGroup" class="space-y-3">
                    <input type="text" id="mediaUrl" placeholder="External URL..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white outline-none">
                    <div class="relative group">
                        <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="bg-slate-700 group-hover:bg-slate-600 p-3 rounded-xl text-center text-xs font-bold transition-colors">UPLOAD FILE</div>
                    </div>
                    <button id="playPauseBtn" class="hidden w-full py-3 bg-slate-900 border border-slate-700 rounded-xl text-sm font-black">PLAY / PAUSE</button>
                </div>

                <hr class="border-slate-700">

                <div class="space-y-4">
                    <div>
                        <label class="flex justify-between text-sm font-bold mb-2">
                            <span>Resolution</span>
                            <span id="resVal" class="text-purple-400">120</span>
                        </label>
                        <input type="range" id="resolution" min="20" max="400" value="120" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                    </div>
                    <div>
                        <label class="flex justify-between text-sm font-bold mb-2">
                            <span>Char Depth</span>
                            <span id="lhVal" class="text-purple-400">0.50</span>
                        </label>
                        <input type="range" id="lineHeight" min="0.2" max="1" step="0.01" value="0.50" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pink-500">
                    </div>
                </div>

                <div class="pt-4 space-y-3">
                    <button id="shareLinkBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 transition-all rounded-2xl font-black text-xs text-white shadow-lg">
                        GENERATE SHORT LINK
                    </button>
                    <div id="status" class="hidden text-center py-3 bg-slate-900 border border-slate-700 rounded-xl text-xs font-bold text-purple-400"></div>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div id="canvasContainer" class="bg-black rounded-[2rem] border-4 border-slate-800 overflow-hidden shadow-2xl flex flex-col h-[75vh] relative">
                    <div class="absolute top-4 left-4 z-20">
                        <span id="engineLabel" class="px-3 py-1 bg-purple-500/20 backdrop-blur-md rounded-full text-[10px] font-black uppercase tracking-widest text-purple-400 border border-purple-500/30">PACKET ENGINE</span>
                    </div>
                    <div class="flex-grow overflow-auto p-8 custom-scrollbar bg-black flex justify-center items-start">
                        <div id="ascii-output">READY</div>
                    </div>
                </div>
                <div class="flex items-center justify-between px-6 text-slate-500 text-xs font-mono uppercase tracking-widest">
                    <div id="dimensions">Idle</div>
                    <div id="perfCounter"></div>
                </div>
            </div>
        </div>
    </div>

    <video id="hiddenVideo" class="hidden" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script type="module">
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeXmQJLhzY1OEiZUl3XAZFD_pyJhw9T4EumqPoF7NNgawmysA/formResponse";
        const ENTRY_ID = "entry.1073679969";
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1MctYRewEga7HPEHcAGnamu8U5Ww1h-46o0KDLzLAcAk/export?format=csv";

        const elements = {
            res: document.getElementById('resolution'),
            lh: document.getElementById('lineHeight'),
            out: document.getElementById('ascii-output'),
            hVid: document.getElementById('hiddenVideo'),
            hCan: document.getElementById('hiddenCanvas'),
            status: document.getElementById('status'),
            share: document.getElementById('shareLinkBtn')
        };
        const ctx = elements.hCan.getContext('2d', { willReadFrequently: true, alpha: false });
        
        let originalImage = null;
        let isVideoMode = false;
        let currentFileBase64 = null;
        let cachedFontSize = 0;
        const alphabet = " .:-=+*#%@";

        function processFrame(source) {
            const start = performance.now();
            const res = parseInt(elements.res.value);
            const lh = parseFloat(elements.lh.value);
            const sW = source.videoWidth || source.width || 1;
            const sH = source.videoHeight || source.height || 1;

            const w = res;
            const h = Math.floor(res * (sH / sW) * lh);

            if (elements.hCan.width !== w || elements.hCan.height !== h) {
                elements.hCan.width = w; elements.hCan.height = h;
                cachedFontSize = 0;
            }
            
            ctx.drawImage(source, 0, 0, w, h);
            const { data } = ctx.getImageData(0, 0, w, h);
            let ascii = "";
            for (let y = 0; y < h; y++) {
                let row = "";
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) << 2;
                    const b = (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]) / 255;
                    row += alphabet[(b * (alphabet.length - 1)) | 0];
                }
                ascii += row + "\n";
            }
            elements.out.textContent = ascii;

            if (cachedFontSize === 0) {
                const cw = document.getElementById('canvasContainer').offsetWidth - 64;
                cachedFontSize = Math.max(0.5, Math.min(12, (cw / w)));
                elements.out.style.fontSize = `${cachedFontSize}px`;
            }

            document.getElementById('dimensions').textContent = `${w}x${h}`;
            document.getElementById('perfCounter').textContent = `${Math.round(performance.now() - start)}ms`;
        }

        const update = () => {
            document.getElementById('resVal').textContent = elements.res.value;
            document.getElementById('lhVal').textContent = elements.lh.value;
            cachedFontSize = 0;
            if (!isVideoMode && originalImage) processFrame(originalImage);
        };
        elements.res.oninput = update;
        elements.lh.oninput = update;

        document.getElementById('fileInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                currentFileBase64 = ev.target.result;
                if (!isVideoMode) {
                    const img = new Image();
                    img.onload = () => { originalImage = img; processFrame(img); };
                    img.src = ev.target.result;
                } else {
                    elements.hVid.src = ev.target.result;
                    elements.hVid.play();
                }
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function videoLoop() {
            if (isVideoMode && !elements.hVid.paused) processFrame(elements.hVid);
            requestAnimationFrame(videoLoop);
        }
        videoLoop();

        document.getElementById('modeImage').onclick = () => {
            isVideoMode = false; elements.hVid.pause();
            document.getElementById('playPauseBtn').classList.add('hidden');
        };
        document.getElementById('modeVideo').onclick = () => {
            isVideoMode = true;
            document.getElementById('playPauseBtn').classList.remove('hidden');
        };

        elements.share.onclick = async () => {
            showStatus("PACKING DATA...", "text-purple-400");

            const media = isVideoMode ? (document.getElementById('mediaUrl').value || currentFileBase64) : (document.getElementById('mediaUrl').value || currentFileBase64);
            if (!media) { showStatus("NO MEDIA", "text-red-400"); return; }

            // Everything is packed into one string for the single paragraph field
            const packet = JSON.stringify({
                v: isVideoMode ? 1 : 0,
                r: elements.res.value,
                l: elements.lh.value,
                src: media
            });

            const formData = new URLSearchParams();
            formData.append(ENTRY_ID, packet);

            try {
                // Submit via standard POST to Google Form
                await fetch(FORM_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                // Fetch current Sheet state to estimate ID
                const resp = await fetch(SHEET_CSV_URL);
                const csv = await resp.text();
                const lines = csv.trim().split('\n');
                const nextId = lines.length; // Row number as short ID

                const url = `${window.location.origin}${window.location.pathname}?id=${nextId}`;
                copyToClipboard(url);
                showStatus(`LINK COPIED! (ID: ${nextId})`, "text-purple-400");
            } catch (err) {
                showStatus("SUBMISSION ERROR", "text-red-400");
                console.error(err);
            }
        };

        async function loadFromSheet(id) {
            showStatus("FETCHING PACKET...", "text-purple-400");
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csv = await response.text();
                // Simple CSV parsing that respects potential line breaks in data
                const lines = csv.split(/\r?\n/);
                
                // Target the specific row (ID)
                const targetLine = lines[id - 1]; 
                if (!targetLine) throw new Error("ID Not Found");

                // Everything after the first comma is our data packet
                const firstComma = targetLine.indexOf(',');
                let dataPart = targetLine.substring(firstComma + 1);
                
                // Clean up Google Sheets CSV escaping (quotes)
                if (dataPart.startsWith('"') && dataPart.endsWith('"')) {
                    dataPart = dataPart.substring(1, dataPart.length - 1);
                }
                dataPart = dataPart.replace(/""/g, '"');
                
                const cfg = JSON.parse(dataPart);

                document.body.classList.add('view-mode');
                elements.res.value = cfg.r;
                elements.lh.value = cfg.l;
                update();

                if (cfg.v === 1) {
                    isVideoMode = true; elements.hVid.src = cfg.src; elements.hVid.play();
                } else {
                    const img = new Image();
                    img.onload = () => { originalImage = img; processFrame(img); };
                    img.src = cfg.src;
                }
                elements.status.classList.add('hidden');
            } catch (e) {
                showStatus("LOAD FAILED: CHECK SHEET PUBLICITY", "text-red-400");
                console.error("Parse Error:", e);
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                loadFromSheet(parseInt(id));
            }
        };

        function showStatus(msg, color) {
            elements.status.textContent = msg;
            elements.status.className = `text-center py-3 bg-slate-900 border border-slate-700 rounded-xl text-xs font-bold ${color}`;
            elements.status.classList.remove('hidden');
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
        }
    </script>
</body>
</html>
